<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포인트 상점 🎓</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f8;--text2:#888899;--text3:#555566;
  --accent:#7c6fff;--accent2:#a78bfa;--accent-bg:rgba(124,111,255,0.12);--accent-glow:rgba(124,111,255,0.3);
  --green:#34d399;--green-bg:rgba(52,211,153,0.1);
  --red:#f87171;--red-bg:rgba(248,113,113,0.1);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.1);
  --radius:14px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.card{background:rgba(18,18,26,0.95);backdrop-filter:blur(20px);border:0.5px solid var(--border2);border-radius:var(--radius);box-shadow:var(--shadow)}

/* LOGIN */
.login-wrap{width:100%;max-width:400px}
.logo-area{text-align:center;margin-bottom:32px}
.logo-icon{width:72px;height:72px;background:var(--accent-bg);border:0.5px solid var(--accent-glow);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;box-shadow:0 0 30px var(--accent-glow)}
.logo-area h1{font-size:26px;font-weight:700}
.logo-area p{font-size:14px;color:var(--text2);margin-top:6px}
.login-card{padding:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.field input{width:100%;background:rgba(255,255,255,0.04);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;}

/* BUTTONS */
.btn{padding:11px 20px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:disabled{opacity:0.4; cursor:not-allowed; filter: grayscale(1);}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 16px var(--accent-glow)}
.btn-secondary{background:rgba(255,255,255,0.06);color:var(--text2);border:0.5px solid var(--border2)}
.btn-danger{background:var(--red-bg);color:var(--red);border:0.5px solid rgba(248,113,113,.3)}
.btn-green{background:var(--green-bg);color:var(--green);border:0.5px solid rgba(52,211,153,.3)}
.btn-full{width:100%}
.btn-sm{padding:6px 14px;font-size:12px}

/* MAIN STRUCTURE */
.main-wrap{width:100%;max-width:580px;display:none}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:0.5px solid var(--border)}
.top-bar-left{display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;background:var(--accent-bg);border:0.5px solid var(--accent-glow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent2)}
.logout-btn{font-size:12px;padding:6px 14px;background:none;border:0.5px solid var(--border2);border-radius:20px;color:var(--text2);cursor:pointer}
.tabs{display:flex;border-bottom:0.5px solid var(--border);padding:0 4px}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.panel{padding:20px;display:none}
.panel.active{display:block}

/* STUDENT UI */
.point-banner{background:linear-gradient(135deg,rgba(124,111,255,.15),rgba(167,139,250,.08));border:0.5px solid var(--accent-glow);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:20px}
.point-banner .val{font-size:48px;font-weight:700;color:var(--accent2)}

/* LIST ITEMS */
.shop-item{background:rgba(255,255,255,0.03);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.item-info{flex:1}
.item-name{font-size:14px;font-weight:600;margin-bottom:2px}
.item-price{font-size:13px;font-weight:700;color:var(--accent2)}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border)}
.plus{color:var(--green)} .minus{color:var(--red)}

/* ADMIN TOOLS */
.admin-ctrl-box{background:rgba(255,255,255,0.02); padding:15px; border-radius:12px; border:0.5px solid var(--border); margin-bottom:20px;}
.admin-input-group{display:flex; gap:8px; margin-bottom:8px;}
.admin-input-group input, .admin-input-group select {
    background:#000; color:#fff; border:1px solid var(--border2); padding:10px; border-radius:8px; font-size:14px; outline:none;
}

/* MODAL */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center;padding:24px}
.modal-wrap.open{display:flex}
.modal-box{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:28px;width:100%;max-width:400px}
.modal-box input, .modal-box select { width:100%; padding:12px; background:rgba(0,0,0,0.3); border:1px solid var(--border2); border-radius:8px; color:white; margin-bottom:12px; outline:none; }

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.1);backdrop-filter:blur(16px);border:0.5px solid var(--border2);padding:12px 22px;border-radius:30px;font-size:13px;opacity:0;transition:all .3s;z-index:200;pointer-events:none}
.toast.show{opacity:1}
.scroll-area{max-height:450px;overflow-y:auto;padding-right:4px}
</style>
</head>
<body>

<div class="app">

  <div class="login-wrap" id="loginWrap">
    <div class="logo-area">
      <div class="logo-icon">🎓</div>
      <h1>포인트 상점</h1>
      <p id="connStatus">연결 대기 중...</p>
    </div>
    <div class="card login-card">
      <div class="field"><label>아이디</label><input type="text" id="loginId" placeholder="admin 또는 학생아이디"></div>
      <div class="field"><label>비밀번호</label><input type="password" id="loginPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <p id="loginErr" style="color:var(--red); font-size:13px; margin-bottom:12px; display:none;">로그인 정보가 올바르지 않습니다.</p>
      <button class="btn btn-primary btn-full" onclick="doLogin()">로그인</button>
    </div>
  </div>

  <div class="main-wrap card" id="studentWrap">
    <div class="top-bar">
      <div class="top-bar-left"><div class="avatar" id="sAvatar"></div><div id="sName"></div></div>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="sTab('home',this)">홈</div>
      <div class="tab" onclick="sTab('shop',this)">상점</div>
      <div class="tab" onclick="sTab('history',this)">내역</div>
    </div>
    <div class="panel active" id="s-home">
      <div class="point-banner"><div class="val"><span id="sPoints">0</span> P</div></div>
      <p style="text-align:center; color:var(--text3); font-size:13px">포인트를 모아 원하는 아이템을 구매하세요!</p>
    </div>
    <div class="panel" id="s-shop">
      <div class="scroll-area" id="shopList"></div>
    </div>
    <div class="panel" id="s-history">
      <div class="scroll-area" id="sHistList"></div>
    </div>
  </div>

  <div class="main-wrap card" id="adminWrap" style="max-width:640px">
    <div class="top-bar">
      <div class="top-bar-left"><div class="avatar" style="color:var(--amber);background:var(--amber-bg)">A</div><b>관리자 모드</b></div>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="aTab('orders',this)">주문 관리</div>
      <div class="tab" onclick="aTab('students',this)">학생 관리</div>
      <div class="tab" onclick="aTab('shop',this)">상점 관리</div>
    </div>

    <div class="panel active" id="a-orders">
      <div class="admin-ctrl-box">
        <label style="font-size:12px; color:var(--text2); display:block; margin-bottom:8px;">학생별 주문 필터</label>
        <select id="orderFilterStudent" style="width:100%; background:#000; color:#fff; border:1px solid var(--border2); padding:10px; border-radius:8px" onchange="renderAdminOrders()">
          <option value="전체">전체 주문 보기</option>
        </select>
      </div>
      <div class="scroll-area" id="adminOrders"></div>
    </div>

    <div class="panel" id="a-students">
      <div class="admin-ctrl-box">
        <div class="admin-input-group">
          <select id="giveStudent" style="flex:1.5"></select>
          <input type="number" id="giveAmt" placeholder="P" style="flex:1">
          <button class="btn btn-primary btn-sm" onclick="givePoints()">지급</button>
        </div>
        <input type="text" id="giveReason" placeholder="지급 사유 입력 (예: 청소 우수, 과제 제출)" style="width:100%; background:#000; color:#fff; border:1px solid var(--border2); padding:10px; border-radius:8px">
      </div>
      <div class="scroll-area" id="adminStudentList"></div>
      <button class="btn btn-green btn-full" style="margin-top:10px" onclick="openAddStudentModal()">+ 학생 추가 등록</button>
    </div>

    <div class="panel" id="a-shop">
      <div class="scroll-area" id="adminShopList"></div>
      <button class="btn btn-primary btn-full" style="margin-top:10px" onclick="openAddItemModal()">+ 상점 상품 추가</button>
    </div>
  </div>
</div>

<div class="modal-wrap" id="modalWrap"><div class="modal-box"><h3 id="modalTitle" style="margin-bottom:15px"></h3><div id="modalContent"></div><div style="display:flex; gap:10px; margin-top:20px" id="modalBtns"></div></div></div>
<div class="toast" id="toast"></div>

<script>
const FIREBASE_URL = "https://point-7419d-default-rtdb.asia-southeast1.firebasedatabase.app/data.json";
let DATA = { students: [], items: [], orders: [] };
let currentUser = null;

async function dbLoad() {
  try {
    const res = await fetch(FIREBASE_URL);
    const json = await res.json();
    if (json) {
      DATA = {
        students: Array.isArray(json.students) ? json.students : [],
        items: Array.isArray(json.items) ? json.items : [],
        orders: Array.isArray(json.orders) ? json.orders : []
      };
    }
    document.getElementById('connStatus').textContent = "온라인 연결됨";
  } catch (e) {
    document.getElementById('connStatus').textContent = "오프라인 모드";
  }
}

async function dbSave() {
  await fetch(FIREBASE_URL, { method: 'PUT', body: JSON.stringify(DATA) });
}

async function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value.trim();
  await dbLoad();

  if (id === 'admin' && pw === 'admin1234') {
    currentUser = { role: 'admin' };
    showUI('adminWrap'); renderAdmin();
  } else {
    const s = DATA.students.find(x => x.id === id && x.pw === pw);
    if (s) {
      currentUser = { role: 'student', data: s };
      showUI('studentWrap'); renderStudent();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }
}

function showUI(id) {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById(id).style.display = 'block';
}

function logout() { location.reload(); }

// --- STUDENT LOGIC ---
function renderStudent() {
  const s = DATA.students.find(x => x.id === currentUser.data.id); // 최신 데이터 참조
  document.getElementById('sName').innerHTML = `<b>${s.name}</b>`;
  document.getElementById('sAvatar').textContent = s.name[0];
  document.getElementById('sPoints').textContent = Number(s.points).toLocaleString();
  renderShop();
  renderStudentHistory(s);
}

function renderShop() {
  const list = document.getElementById('shopList');
  list.innerHTML = DATA.items.map(i => {
    const s = DATA.students.find(x => x.id === currentUser.data.id);
    const canBuy = Number(s.points) >= Number(i.price) && Number(i.stock) > 0;
    return `
      <div class="shop-item">
        <div style="font-size:24px;">${i.icon}</div>
        <div class="item-info">
          <div class="item-name">${i.name}</div>
          <div class="item-price">${i.price} P <small style="color:var(--text3)">| 재고 ${i.stock}</small></div>
        </div>
        <button class="btn btn-primary btn-sm" ${!canBuy ? 'disabled' : ''} onclick="buyItem(${i.id})">
          ${Number(i.stock) <= 0 ? '품절' : '구매'}
        </button>
      </div>`;
  }).join('') || '<p style="text-align:center; padding:40px; color:var(--text3)">상품이 없습니다.</p>';
}

async function buyItem(id) {
  const i = DATA.items.find(x => x.id === id);
  const s = DATA.students.find(x => x.id === currentUser.data.id);
  
  if(Number(s.points) < Number(i.price)) return;
  if(!confirm(`[${i.name}]을 구매하시겠습니까?`)) return;

  s.points = Number(s.points) - Number(i.price);
  i.stock = Number(i.stock) - 1;
  
  if(!s.history) s.history = [];
  s.history.push({ label: `상점: ${i.name}`, points: -i.price, date: new Date().toLocaleString() });
  
  DATA.orders.unshift({
    id: Date.now(), 
    studentName: s.name, 
    studentId: s.id,
    itemName: i.name, 
    status: 'pending', 
    date: new Date().toLocaleString()
  });

  await dbSave(); renderStudent(); toast("구매 성공!");
}

function renderStudentHistory(s) {
  const list = document.getElementById('sHistList');
  const hist = s.history || [];
  list.innerHTML = hist.slice().reverse().map(h => `
    <div class="hist-item">
      <div><b>${h.label}</b><br><small style="color:var(--text3)">${h.date}</small></div>
      <div class="${h.points>0?'plus':'minus'}">${h.points>0?'+':''}${h.points}P</div>
    </div>`).join('') || '<p style="text-align:center; padding:20px; color:var(--text3)">내역이 없습니다.</p>';
}

// --- ADMIN LOGIC ---
function renderAdmin() {
  const filterSelect = document.getElementById('orderFilterStudent');
  const currentFilter = filterSelect.value;
  filterSelect.innerHTML = '<option value="전체">전체 주문 보기</option>' + 
    DATA.students.map(s => `<option value="${s.id}" ${currentFilter===s.id?'selected':''}>${s.name} (${s.id})</option>`).join('');

  renderAdminOrders();
  renderAdminStudents();
  renderAdminShop();
}

function renderAdminOrders() {
  const filterId = document.getElementById('orderFilterStudent').value;
  const list = document.getElementById('adminOrders');
  
  const filteredOrders = filterId === '전체' ? DATA.orders : DATA.orders.filter(o => o.studentId === filterId);

  list.innerHTML = filteredOrders.map(o => `
    <div class="shop-item" style="opacity:${o.status==='done'?0.6:1}">
      <div style="flex:1"><b>${o.studentName}</b> <small style="color:var(--text3)">(${o.studentId})</small><br>
      <span style="color:var(--accent2)">${o.itemName}</span><br><small style="color:var(--text3)">${o.date}</small></div>
      ${o.status==='pending'?`<button class="btn btn-green btn-sm" onclick="completeOrder(${o.id})">완료</button>`:''}
      <button class="btn btn-danger btn-sm" onclick="deleteOrder(${o.id})">X</button>
    </div>`).join('') || '<p style="text-align:center; padding:40px; color:var(--text3)">주문 내역이 없습니다.</p>';
}

async function completeOrder(id) {
  const o = DATA.orders.find(x=>x.id===id);
  if(o) o.status = 'done';
  await dbSave(); renderAdminOrders();
}

async function deleteOrder(id) {
  if(!confirm("주문을 삭제하시겠습니까?")) return;
  DATA.orders = DATA.orders.filter(x=>x.id!==id);
  await dbSave(); renderAdminOrders();
}

function renderAdminStudents() {
  const list = document.getElementById('adminStudentList');
  list.innerHTML = DATA.students.map(s => `
    <div class="shop-item">
      <div style="flex:1"><b>${s.name}</b> (${s.id})<br><small>보유: ${Number(s.points).toLocaleString()} P</small></div>
      <button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.id}')">삭제</button>
    </div>`).join('');
  
  const giveSelect = document.getElementById('giveStudent');
  const currentSelect = giveSelect.value;
  giveSelect.innerHTML = DATA.students.map(s => `<option value="${s.id}" ${currentSelect===s.id?'selected':''}>${s.name}</option>`).join('');
}

async function givePoints() {
  const sid = document.getElementById('giveStudent').value;
  const amt = parseInt(document.getElementById('giveAmt').value);
  const reason = document.getElementById('giveReason').value.trim() || "관리자 지급";
  
  const s = DATA.students.find(x=>x.id === sid);
  if(!s || isNaN(amt)) { alert("금액을 확인해주세요."); return; }
  
  s.points = (Number(s.points) || 0) + amt;
  if(!s.history) s.history = [];
  s.history.push({ label: reason, points: amt, date: new Date().toLocaleString() });
  
  await dbSave(); renderAdmin(); toast("포인트 지급 완료!");
  document.getElementById('giveAmt').value = '';
  document.getElementById('giveReason').value = '';
}

async function deleteStudent(id) {
  if(!confirm("학생의 모든 데이터가 삭제됩니다. 계속하시겠습니까?")) return;
  DATA.students = DATA.students.filter(s => s.id !== id);
  DATA.orders = DATA.orders.filter(o => o.studentId !== id);
  await dbSave(); renderAdmin();
}

function renderAdminShop() {
  const list = document.getElementById('adminShopList');
  list.innerHTML = DATA.items.map(i => `
    <div class="shop-item">
      <div style="font-size:24px;">${i.icon}</div>
      <div style="flex:1"><b>${i.name}</b><br><small>${i.price}P | 재고 ${i.stock}개</small></div>
      <button class="btn btn-danger btn-sm" onclick="deleteItem(${i.id})">삭제</button>
    </div>`).join('') || '<p style="text-align:center; padding:20px;">상품이 비어있습니다.</p>';
}

async function deleteItem(id) {
  if(!confirm("상품을 삭제하시겠습니까?")) return;
  DATA.items = DATA.items.filter(i => i.id !== id);
  await dbSave(); renderAdminShop();
}

// --- MODALS ---
function openAddStudentModal() {
  openModal("신규 학생 등록", `
    <input type="text" id="asId" placeholder="아이디(ID)">
    <input type="text" id="asName" placeholder="학생 이름">
    <input type="text" id="asPw" placeholder="비밀번호">
  `, [{label:"등록", cls:"btn-primary", fn: async() => {
    const id = document.getElementById('asId').value.trim();
    const name = document.getElementById('asName').value.trim();
    const pw = document.getElementById('asPw').value.trim();
    if(id && name && pw) {
      if(DATA.students.some(s=>s.id===id)) { alert("이미 사용 중인 ID입니다."); return; }
      DATA.students.push({id, name, pw, points:0, history:[]});
      await dbSave(); renderAdmin(); closeModal(); toast("학생 등록됨");
    }
  }}, {label:"취소", cls:"btn-secondary", fn: closeModal}]);
}

function openAddItemModal() {
  openModal("상품 등록", `
    <input type="text" id="aiI" placeholder="이모지 (예: 🍎, 🍜)">
    <input type="text" id="aiN" placeholder="상품명">
    <input type="number" id="aiP" placeholder="가격(P)">
    <input type="number" id="aiS" placeholder="초기 재고" value="10">
    <select id="aiC"><option>간식</option><option>특권</option></select>
  `, [{label:"추가", cls:"btn-primary", fn: async() => {
    const n = document.getElementById('aiN').value.trim();
    const p = parseInt(document.getElementById('aiP').value);
    const s = parseInt(document.getElementById('aiS').value);
    if(n && !isNaN(p)) {
      DATA.items.push({id:Date.now(), name:n, price:p, icon:document.getElementById('aiI').value||'🎁', stock:s, cat:document.getElementById('aiC').value});
      await dbSave(); renderAdmin(); closeModal(); toast("상품 추가됨");
    }
  }}, {label:"취소", cls:"btn-secondary", fn: closeModal}]);
}

function openModal(title, content, btns) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalContent').innerHTML = content;
  const area = document.getElementById('modalBtns'); area.innerHTML = '';
  btns.forEach(b => {
    const btn = document.createElement('button'); btn.className = 'btn ' + b.cls;
    btn.textContent = b.label; btn.onclick = b.fn; area.appendChild(btn);
  });
  document.getElementById('modalWrap').classList.add('open');
}
function closeModal() { document.getElementById('modalWrap').classList.remove('open'); }
function sTab(id, el) {
  document.querySelectorAll('#studentWrap .tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#studentWrap .panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); document.getElementById('s-'+id).classList.add('active');
}
function aTab(id, el) {
  document.querySelectorAll('#adminWrap .tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#adminWrap .panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); document.getElementById('a-'+id).classList.add('active');
}
function toast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000);
}
