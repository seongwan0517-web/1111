<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포인트 상점 🎓</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f8;--text2:#888899;--text3:#555566;
  --accent:#7c6fff;--accent2:#a78bfa;--accent-bg:rgba(124,111,255,0.12);--accent-glow:rgba(124,111,255,0.3);
  --green:#34d399;--green-bg:rgba(52,211,153,0.1);
  --red:#f87171;--red-bg:rgba(248,113,113,0.1);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.1);
  --radius:14px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.card{background:rgba(18,18,26,0.95);backdrop-filter:blur(20px);border:0.5px solid var(--border2);border-radius:var(--radius);box-shadow:var(--shadow)}

/* LOGIN */
.login-wrap{width:100%;max-width:400px}
.logo-area{text-align:center;margin-bottom:32px}
.logo-icon{width:72px;height:72px;background:var(--accent-bg);border:0.5px solid var(--accent-glow);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;box-shadow:0 0 30px var(--accent-glow)}
.logo-area h1{font-size:26px;font-weight:700}
.logo-area p{font-size:14px;color:var(--text2);margin-top:6px}
.login-card{padding:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.field input,.field select{width:100%;background:rgba(255,255,255,0.04);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.error-msg{font-size:13px;color:var(--red);margin:-8px 0 12px;display:none}

/* BUTTONS */
.btn{padding:11px 20px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 16px var(--accent-glow)}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:rgba(255,255,255,0.06);color:var(--text2);border:0.5px solid var(--border2)}
.btn-danger{background:var(--red-bg);color:var(--red);border:0.5px solid rgba(248,113,113,.3)}
.btn-green{background:var(--green-bg);color:var(--green);border:0.5px solid rgba(52,211,153,.3)}
.btn-full{width:100%}
.btn-sm{padding:6px 14px;font-size:12px}

/* MAIN STRUCTURE */
.main-wrap{width:100%;max-width:560px;display:none}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:0.5px solid var(--border)}
.top-bar-left{display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;background:var(--accent-bg);border:0.5px solid var(--accent-glow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent2)}
.logout-btn{font-size:12px;padding:6px 14px;background:none;border:0.5px solid var(--border2);border-radius:20px;color:var(--text2);cursor:pointer}
.tabs{display:flex;border-bottom:0.5px solid var(--border);padding:0 4px}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.panel{padding:20px;display:none}
.panel.active{display:block}

/* STUDENT HOME */
.point-banner{background:linear-gradient(135deg,rgba(124,111,255,.15),rgba(167,139,250,.08));border:0.5px solid var(--accent-glow);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:20px}
.point-banner .lbl{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.point-banner .val{font-size:48px;font-weight:700;color:var(--accent2)}

/* SHOP */
.shop-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-chip{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;border:0.5px solid var(--border2);background:none;color:var(--text2);cursor:pointer}
.filter-chip.active{background:var(--accent-bg);border-color:var(--accent-glow);color:var(--accent2)}
.shop-item{background:rgba(255,255,255,0.03);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.item-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.item-cat-snack{background:rgba(251,191,36,.12)}
.item-cat-privilege{background:rgba(124,111,255,.12)}
.item-cat-goods{background:rgba(52,211,153,.1)}
.item-info{flex:1}
.item-name{font-size:14px;font-weight:600}
.item-price{font-size:13px;font-weight:700;color:var(--accent2)}

/* ADMIN STATS */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:rgba(255,255,255,0.03);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-card .s-lbl{font-size:11px;color:var(--text3);margin-bottom:6px}
.stat-card .s-val{font-size:22px;font-weight:700}

/* HISTORY */
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:0.5px solid var(--border)}
.hist-pts.plus{color:var(--green)}
.hist-pts.minus{color:var(--red)}

/* MODAL & TOAST */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:24px}
.modal-wrap.open{display:flex}
.modal-box{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);padding:28px;width:100%;max-width:420px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.1);backdrop-filter:blur(16px);border:0.5px solid var(--border2);padding:12px 22px;border-radius:30px;font-size:13px;opacity:0;transition:all .3s;z-index:200}
.toast.show{opacity:1}
.scroll-area{max-height:400px;overflow-y:auto}
</style>
</head>
<body>

<div class="app">

  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="logo-area">
      <div class="logo-icon">🎓</div>
      <h1>포인트 상점</h1>
      <p id="connStatus">데이터베이스 연결 확인 중...</p>
    </div>
    <div class="card login-card">
      <div class="field"><label>아이디</label><input type="text" id="loginId" placeholder="아이디 입력"></div>
      <div class="field"><label>비밀번호</label><input type="password" id="loginPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <p class="error-msg" id="loginErr">아이디 또는 비밀번호가 틀렸습니다.</p>
      <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">로그인</button>
    </div>
  </div>

  <!-- STUDENT UI -->
  <div class="main-wrap card" id="studentWrap">
    <div class="top-bar">
      <div class="top-bar-left"><div class="avatar" id="sAvatar"></div><div><span id="sName" style="font-weight:600"></span><span style="font-size:10px; margin-left:5px; color:var(--text3)">학생</span></div></div>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="sTab('home',this)">홈</div>
      <div class="tab" onclick="sTab('shop',this)">상점</div>
      <div class="tab" onclick="sTab('history',this)">내역</div>
    </div>
    <div class="panel active" id="s-home">
      <div class="point-banner">
        <div class="lbl">내 보유 포인트</div>
        <div class="val"><span id="sPoints">0</span> P</div>
      </div>
      <div style="font-size:13px; color:var(--text3); text-align:center">환영합니다! 상점에서 포인트를 사용해보세요.</div>
    </div>
    <div class="panel" id="s-shop">
      <div class="shop-filter" id="shopFilter"></div>
      <div class="scroll-area" id="shopList"></div>
    </div>
    <div class="panel" id="s-history">
      <div class="scroll-area" id="sHistList"></div>
    </div>
  </div>

  <!-- ADMIN UI -->
  <div class="main-wrap card" id="adminWrap" style="max-width:640px">
    <div class="top-bar">
      <div class="top-bar-left"><div class="avatar" style="color:var(--amber); background:var(--amber-bg)">A</div><span style="font-weight:600">관리자 패널</span></div>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="aTab('orders',this)">주문 관리</div>
      <div class="tab" onclick="aTab('students',this)">학생 관리</div>
      <div class="tab" onclick="aTab('shop',this)">상점 설정</div>
    </div>
    <div class="panel active" id="a-orders">
      <div class="stat-grid" id="adminStats"></div>
      <div class="scroll-area" id="adminOrders"></div>
    </div>
    <div class="panel" id="a-students">
      <div style="background:var(--surface2); padding:16px; border-radius:12px; margin-bottom:16px">
        <div style="font-size:11px; color:var(--text3); margin-bottom:10px">포인트 지급</div>
        <div style="display:flex; gap:8px">
          <select id="giveStudent" style="flex:1; background:#000; color:#fff; border:1px solid var(--border2); padding:10px; border-radius:8px"></select>
          <input type="number" id="giveAmt" placeholder="P" style="width:80px; background:#000; color:#fff; border:1px solid var(--border2); padding:10px; border-radius:8px">
          <button class="btn btn-primary btn-sm" onclick="givePoints()">지급</button>
        </div>
      </div>
      <div class="scroll-area" id="adminStudentList"></div>
      <button class="btn btn-green btn-full" style="margin-top:12px" onclick="openAddStudentModal()">+ 새 학생 등록</button>
    </div>
    <div class="panel" id="a-shop">
      <div class="scroll-area" id="adminShopList"></div>
      <button class="btn btn-primary btn-full" style="margin-top:12px" onclick="openAddItemModal()">+ 새 아이템 등록</button>
    </div>
  </div>

</div>

<div class="modal-wrap" id="modalWrap">
  <div class="modal-box">
    <h3 id="modalTitle" style="margin-bottom:16px"></h3>
    <div id="modalContent"></div>
    <div style="display:flex; gap:10px; margin-top:24px" id="modalBtns"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// 1. DATA & DATABASE (Firebase 연동)
// ═══════════════════════════════════════════════════════════════
const FIREBASE_URL = "https://point-7419d-default-rtdb.asia-southeast1.firebasedatabase.app/data.json";

const DEFAULT_DATA = {
  students: [
    {id:'student1',pw:'1234',name:'김민준',points:500,history:[]}
  ],
  items: [
    {id:1,name:'막대사탕',desc:'달콤한 사탕',price:20,icon:'🍭',stock:50,cat:'간식'},
    {id:2,name:'음료수',desc:'시원한 음료',price:50,icon:'🥤',stock:30,cat:'간식'},
    {id:3,name:'자리 우선권',desc:'원하는 자리 선택',price:100,icon:'💺',stock:10,cat:'특권'},
    {id:4,name:'청소 면제권',desc:'청소 1회 면제',price:150,icon:'🧹',stock:5,cat:'특권'},
    {id:5,name:'오답노트 면제',desc:'제출 1회 면제',price:200,icon:'📝',stock:5,cat:'특권'}
  ],
  orders: []
};

let DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
let currentUser = null;
let activeCat = '전체';

async function dbLoad() {
  try {
    const res = await fetch(FIREBASE_URL);
    const json = await res.json();
    if (json) {
      DATA = json;
      if(!DATA.students) DATA.students = [];
      if(!DATA.items) DATA.items = [];
      if(!DATA.orders) DATA.orders = [];
    } else {
      // 데이터가 아예 없으면 초기 데이터로 채움
      await dbSave();
    }
    document.getElementById('connStatus').textContent = "온라인: 연결됨";
  } catch (e) {
    document.getElementById('connStatus').textContent = "오프라인 모드";
  }
}

async function dbSave() {
  try {
    await fetch(FIREBASE_URL, { method: 'PUT', body: JSON.stringify(DATA) });
  } catch (e) { console.error("저장 실패", e); }
}

// ═══════════════════════════════════════════════════════════════
// 2. AUTH
// ═══════════════════════════════════════════════════════════════
async function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value.trim();
  
  await dbLoad();

  if (id === 'admin' && pw === 'admin1234') {
    currentUser = { role: 'admin' };
    showUI('adminWrap'); renderAdmin();
  } else {
    const s = DATA.students.find(x => x.id === id && x.pw === pw);
    if (s) {
      currentUser = { role: 'student', data: s };
      showUI('studentWrap'); renderStudent();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }
}

function showUI(id) {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById(id).style.display = 'block';
}

function logout() { location.reload(); }

// ═══════════════════════════════════════════════════════════════
// 3. STUDENT
// ═══════════════════════════════════════════════════════════════
function renderStudent() {
  const s = currentUser.data;
  document.getElementById('sName').textContent = s.name;
  document.getElementById('sAvatar').textContent = s.name[0];
  document.getElementById('sPoints').textContent = s.points.toLocaleString();
  renderShop();
  renderStudentHistory();
}

function renderShop() {
  const cats = ['전체', ...new Set(DATA.items.map(i => i.cat))];
  document.getElementById('shopFilter').innerHTML = cats.map(c => 
    `<button class="filter-chip ${activeCat===c?'active':''}" onclick="filterShop('${c}')">${c}</button>`
  ).join('');

  const list = document.getElementById('shopList');
  const items = activeCat === '전체' ? DATA.items : DATA.items.filter(i => i.cat === activeCat);
  
  list.innerHTML = items.map(i => {
    const cc = i.cat==='간식'?'item-cat-snack':i.cat==='특권'?'item-cat-privilege':'item-cat-goods';
    const canBuy = currentUser.data.points >= i.price && i.stock > 0;
    return `
      <div class="shop-item">
        <div class="item-icon ${cc}">${i.icon}</div>
        <div class="item-info">
          <div class="item-name">${i.name}</div>
          <div class="item-price">${i.price} P · <span style="color:var(--text3); font-weight:400">재고 ${i.stock}</span></div>
        </div>
        <button class="btn btn-primary btn-sm" ${!canBuy?'disabled':''} onclick="buyItem(${i.id})">구매</button>
      </div>`;
  }).join('') || '<div style="text-align:center; padding:40px; color:var(--text3)">품목이 없습니다.</div>';
}

function filterShop(c) { activeCat = c; renderShop(); }

async function buyItem(id) {
  const i = DATA.items.find(x => x.id === id);
  const s = currentUser.data;
  if(!confirm(`[${i.name}]을(를) 구매하시겠습니까?`)) return;

  s.points -= i.price;
  i.stock--;
  const hist = { label: i.name, points: -i.price, date: new Date().toISOString().split('T')[0], type:'spend' };
  if(!s.history) s.history = [];
  s.history.push(hist);
  DATA.orders.unshift({ id: Date.now(), studentName: s.name, itemName: i.name, date: hist.date, status: 'pending' });

  await dbSave(); renderStudent(); toast("구매 완료!");
}

function renderStudentHistory() {
  const list = document.getElementById('sHistList');
  list.innerHTML = (currentUser.data.history || []).slice().reverse().map(h => `
    <div class="hist-item">
      <div><div style="font-size:14px">${h.label}</div><div style="font-size:11px; color:var(--text3)">${h.date}</div></div>
      <div class="hist-pts ${h.points>0?'plus':'minus'}">${h.points>0?'+':''}${h.points}P</div>
    </div>`).join('') || '<div style="text-align:center; padding:40px; color:var(--text3)">내역이 없습니다.</div>';
}

function sTab(id, el) {
  document.querySelectorAll('#studentWrap .tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#studentWrap .panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); document.getElementById('s-'+id).classList.add('active');
}

// ═══════════════════════════════════════════════════════════════
// 4. ADMIN
// ═══════════════════════════════════════════════════════════════
function renderAdmin() {
  renderAdminStats();
  renderAdminOrders();
  renderAdminStudents();
  renderAdminShop();
}

function renderAdminStats() {
  const pending = DATA.orders.filter(o => o.status === 'pending').length;
  document.getElementById('adminStats').innerHTML = `
    <div class="stat-card"><div class="s-lbl">학생</div><div class="s-val">${DATA.students.length}</div></div>
    <div class="stat-card"><div class="s-lbl">대기주문</div><div class="s-val" style="color:var(--amber)">${pending}</div></div>
    <div class="stat-card"><div class="s-lbl">총 품목</div><div class="s-val">${DATA.items.length}</div></div>`;
}

function renderAdminOrders() {
  const list = document.getElementById('adminOrders');
  list.innerHTML = DATA.orders.map(o => `
    <div class="shop-item" style="opacity:${o.status==='done'?0.5:1}">
      <div style="flex:1"><div style="font-size:14px"><b>${o.studentName}</b> : ${o.itemName}</div><div style="font-size:11px; color:var(--text3)">${o.date}</div></div>
      ${o.status==='pending'?`<button class="btn btn-green btn-sm" onclick="completeOrder(${o.id})">완료</button>`:''}
      <button class="btn btn-danger btn-sm" onclick="deleteOrder(${o.id})">삭제</button>
    </div>`).join('') || '<div style="padding:40px; text-align:center">주문이 없습니다.</div>';
}

async function completeOrder(id) { DATA.orders.find(x=>x.id===id).status='done'; await dbSave(); renderAdmin(); }
async function deleteOrder(id) { DATA.orders=DATA.orders.filter(x=>x.id!==id); await dbSave(); renderAdmin(); }

function renderAdminStudents() {
  const list = document.getElementById('adminStudentList');
  const sel = document.getElementById('giveStudent');
  list.innerHTML = DATA.students.map(s => `
    <div class="shop-item">
      <div style="flex:1"><b>${s.name}</b> (${s.id})<br><span style="color:var(--accent2); font-size:13px">${s.points} P</span></div>
      <button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.id}')">삭제</button>
    </div>`).join('');
  sel.innerHTML = DATA.students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
}

async function givePoints() {
  const id = document.getElementById('giveStudent').value;
  const amt = parseInt(document.getElementById('giveAmt').value);
  if(!amt) return;
  const s = DATA.students.find(x=>x.id===id);
  s.points += amt;
  if(!s.history) s.history = [];
  s.history.push({ label: '관리자 지급', points: amt, date: new Date().toISOString().split('T')[0], type:'earn' });
  await dbSave(); renderAdmin(); toast("지급 완료");
}

function openAddStudentModal() {
  openModal("학생 등록", `
    <input type="text" id="asId" placeholder="아이디" style="width:100%; margin-bottom:10px; padding:12px; background:#000; border:1px solid var(--border2); color:#fff; border-radius:8px">
    <input type="text" id="asName" placeholder="이름" style="width:100%; margin-bottom:10px; padding:12px; background:#000; border:1px solid var(--border2); color:#fff; border-radius:8px">
    <input type="text" id="asPw" placeholder="비밀번호" style="width:100%; padding:12px; background:#000; border:1px solid var(--border2); color:#fff; border-radius:8px">
  `, [{label:"등록", cls:"btn-primary", fn: async ()=>{
    const id=document.getElementById('asId').value, name=document.getElementById('asName').value, pw=document.getElementById('asPw').value;
    if(id&&name&&pw) { DATA.students.push({id,name,pw,points:0,history:[]}); await dbSave(); renderAdmin(); closeModal(); }
  }}]);
}

async function deleteStudent(id) { if(confirm("삭제할까요?")){DATA.students=DATA.students.filter(x=>x.id!==id); await dbSave(); renderAdmin();}}

function renderAdminShop() {
  const list = document.getElementById('adminShopList');
  list.innerHTML = DATA.items.map(i => `
    <div class="shop-item">
      <div class="item-icon item-cat-snack">${i.icon}</div>
      <div style="flex:1"><b>${i.name}</b> (${i.cat})<br>${i.price} P · 재고 ${i.stock}</div>
      <button class="btn btn-danger btn-sm" onclick="deleteItem(${i.id})">삭제</button>
    </div>`).join('');
}

function openAddItemModal() {
  openModal("아이템 등록", `
    <input type="text" id="aiIcon" placeholder="이모지" style="width:100%; margin-bottom:10px; padding:12px; background:#000; border:1px solid var(--border2); color:#fff; border-radius:8px">
    <input type="text" id="aiName" placeholder="이름" style="width:100%; margin-bottom:10px; padding:12px; background:#000; border:1px solid var(--border2); color:#fff; border-radius:8px">
    <input type="number" id="aiPrice" placeholder="가격" style="width:100%; margin-bottom:10px; padding:12px; background:#000; border:1px solid var(--border2); color:#fff; border-radius:8px">
    <select id="aiCat" style="width:100%; padding:12px; background:#000; border:1px solid var(--border2); color:#fff; border-radius:8px">
      <option>간식</option><option>특권</option><option>상품</option>
    </select>
  `, [{label:"등록", cls:"btn-primary", fn: async ()=>{
    const name=document.getElementById('aiName').value, price=parseInt(document.getElementById('aiPrice').value);
    if(name&&price>=0){ DATA.items.push({id:Date.now(), name, price, icon:document.getElementById('aiIcon').value||'🎁', stock:10, cat:document.getElementById('aiCat').value}); await dbSave(); renderAdmin(); closeModal(); }
  }}]);
}

async function deleteItem(id) { DATA.items=DATA.items.filter(x=>x.id!==id); await dbSave(); renderAdmin(); }

function aTab(id, el) {
  document.querySelectorAll('#adminWrap .tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#adminWrap .panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); document.getElementById('a-'+id).classList.add('active');
}

// ═══════════════════════════════════════════════════════════════
// 5. UTILS
// ═══════════════════════════════════════════════════════════════
function openModal(title, content, btns) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalContent').innerHTML = content;
  const area = document.getElementById('modalBtns'); area.innerHTML = '';
  btns.forEach(b => {
    const btn = document.createElement('button'); btn.className = 'btn ' + b.cls;
    btn.textContent = b.label; btn.onclick = b.fn; area.appendChild(btn);
  });
  document.getElementById('modalWrap').classList.add('open');
}
function closeModal() { document.getElementById('modalWrap').classList.remove('open'); }
function toast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000);
}
