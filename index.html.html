<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// 🔥 Firebase 설정
const firebaseConfig = {
  apiKey: "AIzaSyClc2ZS_N03gWY2SX7Wt5MydzgDKtBaT7c",
  authDomain: "pointapp-21442.firebaseapp.com",
  projectId: "pointapp-21442",
  storageBucket: "pointapp-21442.firebasestorage.app",
  messagingSenderId: "599709947004",
  appId: "1:599709947004:web:aa46c1e4ac46a2fe84e5f9"
};

// 🔥 초기화
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔹 상품 목록 (이건 그대로 유지)
const products = [
    {name: "초코파이", price: 300},
    {name: "콜라", price: 500},
    {name: "사탕", price: 100}
];

let currentUser = null;

// 🔐 로그인 (Firebase에서 불러오기)
async function login() {
    const id = document.getElementById("id").value;
    const pw = document.getElementById("pw").value;

    const ref = doc(db, "students", id);
    const snap = await getDoc(ref);

    if (snap.exists()) {
        const user = snap.data();

        if (user.pw === pw) {
            currentUser = user;

            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("mainBox").classList.remove("hidden");

            updateUI();
        } else {
            alert("비밀번호 오류");
        }
    } else {
        alert("아이디 없음");
    }
}

// 🔄 UI 업데이트
function updateUI() {
    document.getElementById("welcome").innerText = currentUser.name + " 학생";
    document.getElementById("point").innerText = currentUser.point;

    const historyList = document.getElementById("history");
    historyList.innerHTML = "";

    if (!currentUser.history || currentUser.history.length === 0) {
        historyList.innerHTML = "<li>사용 내역 없음</li>";
    } else {
        currentUser.history.forEach(h => {
            const li = document.createElement("li");
            li.innerText = h;
            historyList.appendChild(li);
        });
    }

    const productDiv = document.getElementById("products");
    productDiv.innerHTML = "";

    products.forEach((p, index) => {
        const btn = document.createElement("button");
        btn.innerText = p.name + " (" + p.price + "점)";
        btn.onclick = () => buy(index);
        productDiv.appendChild(btn);
    });
}

// 🛒 구매 + Firebase 저장
async function buy(index) {
    const product = products[index];

    if (currentUser.point >= product.price) {
        currentUser.point -= product.price;

        const date = new Date().toLocaleString();
        if (!currentUser.history) currentUser.history = [];

        currentUser.history.unshift(
            product.name + " 구매 (" + product.price + "점) - " + date
        );

        await updateDoc(doc(db, "students", currentUser.id), {
            point: currentUser.point,
            history: currentUser.history
        });

        alert("구매 완료!");
        updateUI();
    } else {
        alert("포인트 부족!");
    }
}

// 탭
window.showTab = function(tab) {
    document.getElementById("homeTab").classList.add("hidden");
    document.getElementById("shopTab").classList.add("hidden");

    if (tab === "home") {
        document.getElementById("homeTab").classList.remove("hidden");
    } else {
        document.getElementById("shopTab").classList.remove("hidden");
    }
};

// 로그아웃
window.logout = function() {
    currentUser = null;
    document.getElementById("loginBox").classList.remove("hidden");
    document.getElementById("mainBox").classList.add("hidden");
};

// 로그인 버튼 연결 (중요)
window.login = login;

</script>
