<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포인트 상점 🎓 (Firebase 연동)</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f8;--text2:#888899;--text3:#555566;
  --accent:#7c6fff;--accent2:#a78bfa;--accent-bg:rgba(124,111,255,0.12);--accent-glow:rgba(124,111,255,0.3);
  --green:#34d399;--green-bg:rgba(52,211,153,0.1);
  --red:#f87171;--red-bg:rgba(248,113,113,0.1);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.1);
  --radius:14px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.card{background:rgba(18,18,26,0.95);backdrop-filter:blur(20px);border:0.5px solid var(--border2);border-radius:var(--radius);box-shadow:var(--shadow)}

/* LOGIN */
.login-wrap{width:100%;max-width:400px}
.logo-area{text-align:center;margin-bottom:32px}
.logo-icon{width:72px;height:72px;background:var(--accent-bg);border:0.5px solid var(--accent-glow);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;box-shadow:0 0 30px var(--accent-glow)}
.logo-area h1{font-size:26px;font-weight:700}
.logo-area p{font-size:14px;color:var(--text2);margin-top:6px}
.login-card{padding:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,0.04);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.field input::placeholder{color:var(--text3)}
.error-msg{font-size:13px;color:var(--red);margin:-8px 0 12px;display:none}
.btn{padding:11px 20px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 16px var(--accent-glow)}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:rgba(255,255,255,0.06);color:var(--text2);border:0.5px solid var(--border2)}
.btn-secondary:hover{background:rgba(255,255,255,0.1)}
.btn-danger{background:var(--red-bg);color:var(--red);border:0.5px solid rgba(248,113,113,.3)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-green{background:var(--green-bg);color:var(--green);border:0.5px solid rgba(52,211,153,.3)}
.btn-green:hover{background:var(--green);color:#000}
.btn-full{width:100%}
.btn-sm{padding:6px 14px;font-size:12px}

/* MAIN */
.main-wrap{width:100%;max-width:560px;display:none}
.main-wrap.active{display:block}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:0.5px solid var(--border)}
.top-bar-left{display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;background:var(--accent-bg);border:0.5px solid var(--accent-glow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent2);flex-shrink:0}
.role-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:6px}
.role-student{background:var(--accent-bg);color:var(--accent2)}
.role-admin{background:var(--amber-bg);color:var(--amber)}
.logout-btn{font-size:12px;padding:6px 14px;background:none;border:0.5px solid var(--border2);border-radius:20px;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* TABS */
.tabs{display:flex;border-bottom:0.5px solid var(--border);padding:0 4px}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.panel{padding:20px;display:none}
.panel.active{display:block}

/* POINT BANNER */
.point-banner{background:linear-gradient(135deg,rgba(124,111,255,.15),rgba(167,139,250,.08));border:0.5px solid var(--accent-glow);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:20px}
.point-banner .lbl{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.point-banner .val{font-size:48px;font-weight:700;color:var(--accent2);line-height:1}
.point-banner .sub{font-size:13px;color:var(--text3);margin-top:8px}

/* SHOP */
.shop-item{background:rgba(255,255,255,0.03);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.item-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--accent-bg)}

/* ADMIN STATS */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:rgba(255,255,255,0.03);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-card .s-val{font-size:20px;font-weight:700}

/* MODAL / TOAST */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:24px}
.modal-wrap.open{display:flex}
.modal-box{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);padding:28px;width:100%;max-width:420px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.1);backdrop-filter:blur(16px);border:0.5px solid var(--border2);padding:12px 22px;border-radius:30px;font-size:13px;opacity:0;transition:0.3s;pointer-events:none;z-index:200}
.toast.show{opacity:1}
.scroll-area{max-height:400px;overflow-y:auto}
.hist-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border)}
.plus{color:var(--green)} .minus{color:var(--red)}
</style>
</head>
<body>

<div class="app">

  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="logo-area">
      <div class="logo-icon">🎓</div>
      <h1>포인트 상점</h1>
      <p>실시간 데이터베이스 시스템</p>
    </div>
    <div class="card login-card">
      <div class="field"><label>아이디</label><input type="text" id="loginId" placeholder="아이디" value=""></div>
      <div class="field"><label>비밀번호</label><input type="password" id="loginPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <p class="error-msg" id="loginErr">로그인 정보가 틀렸습니다.</p>
      <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">로그인</button>
    </div>
  </div>

  <!-- STUDENT UI -->
  <div class="main-wrap card" id="studentWrap">
    <div class="top-bar">
      <div class="top-bar-left"><div class="avatar" id="sAvatar">S</div><span id="sName" style="font-weight:600"></span></div>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="sTab('home',this)">홈</div>
      <div class="tab" onclick="sTab('shop',this)">상점</div>
      <div class="tab" onclick="sTab('history',this)">내역</div>
    </div>
    <div class="panel active" id="s-home">
      <div class="point-banner">
        <div class="lbl">내 포인트</div>
        <div class="val"><span id="sPoints">0</span> P</div>
      </div>
      <div style="font-size:13px; color:var(--text3); text-align:center">환영합니다! 열심히 포인트를 모아보세요.</div>
    </div>
    <div class="panel" id="s-shop">
      <div class="scroll-area" id="shopList"></div>
    </div>
    <div class="panel" id="s-history">
      <div class="scroll-area" id="sHistList"></div>
    </div>
  </div>

  <!-- ADMIN UI -->
  <div class="main-wrap card" id="adminWrap" style="max-width:640px">
    <div class="top-bar">
      <div class="top-bar-left"><div class="avatar" style="color:var(--amber)">A</div><span style="font-weight:600">관리자 모드</span></div>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="aTab('orders',this)">주문</div>
      <div class="tab" onclick="aTab('students',this)">학생</div>
      <div class="tab" onclick="aTab('shop',this)">상점 설정</div>
    </div>
    
    <div class="panel active" id="a-orders">
      <div class="stat-grid" id="adminStats"></div>
      <div class="scroll-area" id="adminOrders"></div>
    </div>

    <div class="panel" id="a-students">
      <!-- 포인트 지급 -->
      <div style="background:var(--surface2); padding:15px; border-radius:10px; margin-bottom:15px">
        <div style="font-size:12px; margin-bottom:10px; color:var(--text2)">포인트 직접 지급</div>
        <div style="display:flex; gap:5px">
          <select id="giveStudent" style="flex:1"></select>
          <input type="number" id="giveAmt" placeholder="P" style="width:80px">
          <button class="btn btn-primary btn-sm" onclick="givePoints()">지급</button>
        </div>
      </div>
      <div class="scroll-area" id="adminStudentList"></div>
      <button class="btn btn-green btn-full" style="margin-top:10px" onclick="openAddStudentModal()">+ 학생 추가</button>
    </div>

    <div class="panel" id="a-shop">
      <div class="scroll-area" id="adminShopList"></div>
      <button class="btn btn-primary btn-full" style="margin-top:10px" onclick="openAddItemModal()">+ 아이템 추가</button>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-wrap" id="modalWrap">
  <div class="modal-box">
    <h3 id="modalTitle" style="margin-bottom:15px"></h3>
    <div id="modalContent"></div>
    <div style="display:flex; gap:10px; margin-top:20px" id="modalBtns"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// 1. CONFIG & DATABASE
// ═══════════════════════════════════════════════════════════════
const FIREBASE_URL = "https://point-7419d-default-rtdb.asia-southeast1.firebasedatabase.app/data.json";

let DATA = {
  students: [],
  items: [],
  orders: []
};

let currentUser = null;

// 데이터 로드
async function dbLoad() {
  try {
    const res = await fetch(FIREBASE_URL);
    const json = await res.json();
    if (json) {
      DATA = json;
      if (!DATA.students) DATA.students = [];
      if (!DATA.items) DATA.items = [];
      if (!DATA.orders) DATA.orders = [];
    }
  } catch (e) {
    console.error("DB 로드 실패", e);
  }
}

// 데이터 저장
async function dbSave() {
  try {
    await fetch(FIREBASE_URL, {
      method: 'PUT',
      body: JSON.stringify(DATA)
    });
  } catch (e) {
    console.error("DB 저장 실패", e);
  }
}

// ═══════════════════════════════════════════════════════════════
// 2. AUTH
// ═══════════════════════════════════════════════════════════════
async function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value.trim();
  const btn = document.getElementById('loginBtn');
  
  btn.disabled = true; btn.textContent = "동기화 중...";
  await dbLoad();
  btn.disabled = false; btn.textContent = "로그인";

  if (id === 'admin' && pw === 'admin1234') {
    currentUser = { role: 'admin' };
    showUI('adminWrap');
    renderAdmin();
  } else {
    const s = DATA.students.find(x => x.id === id && x.pw === pw);
    if (s) {
      currentUser = { role: 'student', data: s };
      showUI('studentWrap');
      renderStudent();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }
}

function logout() {
  currentUser = null;
  location.reload();
}

function showUI(id) {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('studentWrap').style.display = 'none';
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById(id).style.display = 'block';
}

// ═══════════════════════════════════════════════════════════════
// 3. STUDENT LOGIC
// ═══════════════════════════════════════════════════════════════
function renderStudent() {
  const s = currentUser.data;
  document.getElementById('sName').textContent = s.name;
  document.getElementById('sAvatar').textContent = s.name[0];
  document.getElementById('sPoints').textContent = s.points.toLocaleString();
  renderShop();
  renderStudentHistory();
}

function renderShop() {
  const list = document.getElementById('shopList');
  list.innerHTML = DATA.items.map(item => `
    <div class="shop-item">
      <div class="item-icon">${item.icon}</div>
      <div style="flex:1">
        <div style="font-weight:600; font-size:14px">${item.name}</div>
        <div style="font-size:12px; color:var(--text3)">${item.price}P · 재고 ${item.stock}</div>
      </div>
      <button class="btn btn-primary btn-sm" ${item.stock <= 0 || currentUser.data.points < item.price ? 'disabled' : ''} onclick="buyItem(${item.id})">구매</button>
    </div>
  `).join('');
}

async function buyItem(itemId) {
  const item = DATA.items.find(i => i.id === itemId);
  const s = currentUser.data;

  if (s.points < item.price) return toast("포인트가 부족합니다.");
  if (item.stock <= 0) return toast("재고가 없습니다.");

  if (!confirm(`${item.name}을(를) 구매하시겠습니까?`)) return;

  // 로컬 데이터 반영
  s.points -= item.price;
  item.stock -= 1;
  const hist = { type: 'spend', label: item.name, points: -item.price, date: new Date().toISOString().split('T')[0] };
  if (!s.history) s.history = [];
  s.history.push(hist);

  DATA.orders.unshift({
    id: Date.now(),
    studentName: s.name,
    itemName: item.name,
    status: 'pending',
    date: hist.date
  });

  await dbSave();
  renderStudent();
  toast("구매 완료!");
}

function renderStudentHistory() {
  const hList = document.getElementById('sHistList');
  const history = currentUser.data.history || [];
  hList.innerHTML = history.slice().reverse().map(h => `
    <div class="hist-item">
      <div><div style="font-size:14px">${h.label}</div><div style="font-size:11px; color:var(--text3)">${h.date}</div></div>
      <div class="${h.points > 0 ? 'plus' : 'minus'}">${h.points > 0 ? '+' : ''}${h.points}P</div>
    </div>
  `).join('') || '<div style="padding:20px; text-align:center; color:var(--text3)">내역이 없습니다.</div>';
}

function sTab(id, el) {
  document.querySelectorAll('#studentWrap .tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('#studentWrap .panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('s-' + id).classList.add('active');
}

// ═══════════════════════════════════════════════════════════════
// 4. ADMIN LOGIC
// ═══════════════════════════════════════════════════════════════
function renderAdmin() {
  renderAdminStats();
  renderAdminOrders();
  renderAdminStudents();
  renderAdminShop();
}

function renderAdminStats() {
  const pending = DATA.orders.filter(o => o.status === 'pending').length;
  document.getElementById('adminStats').innerHTML = `
    <div class="stat-card"><div>학생</div><div class="s-val">${DATA.students.length}</div></div>
    <div class="stat-card"><div>대기주문</div><div class="s-val" style="color:var(--amber)">${pending}</div></div>
    <div class="stat-card"><div>총 아이템</div><div class="s-val">${DATA.items.length}</div></div>
  `;
}

function renderAdminOrders() {
  const list = document.getElementById('adminOrders');
  list.innerHTML = DATA.orders.map(o => `
    <div class="shop-item" style="opacity: ${o.status === 'done' ? 0.6 : 1}">
      <div style="flex:1">
        <div style="font-size:14px"><b>${o.studentName}</b>: ${o.itemName}</div>
        <div style="font-size:11px; color:var(--text3)">${o.date} · ${o.status === 'pending' ? '대기중' : '완료'}</div>
      </div>
      ${o.status === 'pending' ? `<button class="btn btn-green btn-sm" onclick="completeOrder(${o.id})">완료</button>` : ''}
      <button class="btn btn-danger btn-sm" onclick="deleteOrder(${o.id})">X</button>
    </div>
  `).join('') || '<div class="empty">주문이 없습니다.</div>';
}

async function completeOrder(id) {
  const o = DATA.orders.find(x => x.id === id);
  o.status = 'done';
  await dbSave(); renderAdmin();
}

async function deleteOrder(id) {
  DATA.orders = DATA.orders.filter(x => x.id !== id);
  await dbSave(); renderAdmin();
}

function renderAdminStudents() {
  const list = document.getElementById('adminStudentList');
  const select = document.getElementById('giveStudent');
  
  list.innerHTML = DATA.students.map(s => `
    <div class="shop-item">
      <div style="flex:1">
        <div style="font-size:14px"><b>${s.name}</b> (${s.id})</div>
        <div style="font-size:12px; color:var(--accent2)">${s.points.toLocaleString()} P</div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="deleteStudent('${s.id}')">삭제</button>
    </div>
  `).join('');

  select.innerHTML = DATA.students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
}

async function givePoints() {
  const id = document.getElementById('giveStudent').value;
  const amt = parseInt(document.getElementById('giveAmt').value);
  if (!amt) return;
  const s = DATA.students.find(x => x.id === id);
  s.points += amt;
  if(!s.history) s.history = [];
  s.history.push({ type: 'earn', label: '관리자 지급', points: amt, date: new Date().toISOString().split('T')[0] });
  await dbSave(); renderAdmin(); toast("지급 완료");
}

function openAddStudentModal() {
  openModal("학생 추가", `
    <input type="text" id="addSid" placeholder="아이디" class="field" style="margin-bottom:10px">
    <input type="text" id="addSname" placeholder="이름" class="field" style="margin-bottom:10px">
    <input type="text" id="addSpw" placeholder="비밀번호" class="field">
  `, [
    { label: "취소", cls: "btn-secondary", fn: closeModal },
    { label: "추가", cls: "btn-primary", fn: async () => {
      const id = document.getElementById('addSid').value;
      const name = document.getElementById('addSname').value;
      const pw = document.getElementById('addSpw').value;
      if(id && name && pw) {
        DATA.students.push({ id, name, pw, points: 0, history: [] });
        await dbSave(); renderAdmin(); closeModal();
      }
    }}
  ]);
}

async function deleteStudent(id) {
  if(!confirm("정말 삭제할까요?")) return;
  DATA.students = DATA.students.filter(x => x.id !== id);
  await dbSave(); renderAdmin();
}

function renderAdminShop() {
  const list = document.getElementById('adminShopList');
  list.innerHTML = DATA.items.map(item => `
    <div class="shop-item">
      <div class="item-icon">${item.icon}</div>
      <div style="flex:1">
        <div><b>${item.name}</b></div>
        <div style="font-size:12px">${item.price}P · 재고 ${item.stock}</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteItem(${item.id})">삭제</button>
    </div>
  `).join('');
}

function openAddItemModal() {
  openModal("아이템 추가", `
    <input type="text" id="addItemIcon" placeholder="아이콘(이모지)" style="width:100%; margin-bottom:10px">
    <input type="text" id="addItemName" placeholder="아이템명" style="width:100%; margin-bottom:10px">
    <input type="number" id="addItemPrice" placeholder="가격" style="width:100%; margin-bottom:10px">
    <input type="number" id="addItemStock" placeholder="초기재고" style="width:100%">
  `, [
    { label: "취소", cls: "btn-secondary", fn: closeModal },
    { label: "추가", cls: "btn-primary", fn: async () => {
      const name = document.getElementById('addItemName').value;
      const icon = document.getElementById('addItemIcon').value || '🎁';
      const price = parseInt(document.getElementById('addItemPrice').value);
      const stock = parseInt(document.getElementById('addItemStock').value);
      if(name && price >= 0) {
        DATA.items.push({ id: Date.now(), name, icon, price, stock });
        await dbSave(); renderAdmin(); closeModal();
      }
    }}
  ]);
}

async function deleteItem(id) {
  if(!confirm("아이템을 삭제할까요?")) return;
  DATA.items = DATA.items.filter(x => x.id !== id);
  await dbSave(); renderAdmin();
}

function aTab(id, el) {
  document.querySelectorAll('#adminWrap .tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('#adminWrap .panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('a-' + id).classList.add('active');
}

// ═══════════════════════════════════════════════════════════════
// 5. UTILS
// ═══════════════════════════════════════════════════════════════
function openModal(title, content, btns) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalContent').innerHTML = content;
  const btnArea = document.getElementById('modalBtns');
  btnArea.innerHTML = '';
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'btn ' + b.cls;
    btn.textContent = b.label;
    btn.onclick = b.fn;
    btnArea.appendChild(btn);
  });
  document.getElementById('modalWrap').classList.add('open');
}

function closeModal() { document.getElementById('modalWrap').classList.remove('open'); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// 초기 데이터 로드 (백그라운드)
dbLoad();
</script>
